name: go | AXM | Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      skip_destructive:
        description: 'Skip destructive tests (assign/unassign device lifecycle)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: '🧪 Run AXM Acceptance Tests'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run AXM Acceptance Tests
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_PRIVATE_KEY_PEM: ${{ secrets.APPLE_PRIVATE_KEY_PEM }}
          AXM_SKIP_DESTRUCTIVE: ${{ inputs.skip_destructive }}
          AXM_VERBOSE: 'true'
          AXM_REQUEST_TIMEOUT: '30s'
        run: |
          echo "::group::🧪 AXM Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running AXM Acceptance Tests"
          echo "  skip_destructive=${{ inputs.skip_destructive }}"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -timeout 5m ./axm/acceptance/... 2>&1 | tee axm_acceptance_output.txt

      - name: Upload Test Output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: axm-acceptance-test-output
          path: axm_acceptance_output.txt
          retention-days: 7
