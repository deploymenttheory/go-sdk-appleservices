name: go | Acceptance Tests

on:
  workflow_dispatch:
    inputs:
      skip_destructive:
        description: 'Skip destructive tests (assign/unassign device lifecycle)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: '🧪 Run Acceptance Tests'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run Acceptance Tests
        env:
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          APPLE_PRIVATE_KEY_PEM: ${{ secrets.APPLE_PRIVATE_KEY_PEM }}
          AXM_SKIP_DESTRUCTIVE: ${{ inputs.skip_destructive }}
          AXM_VERBOSE: 'true'
          AXM_REQUEST_TIMEOUT: '30s'
        run: |
          echo "::group::🧪 Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running Acceptance Tests"
          echo "  skip_destructive=${{ inputs.skip_destructive }}"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -timeout 5m ./axm/acceptance/... 2>&1 | tee acceptance_output.txt

      - name: Upload Test Output
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: acceptance-test-output
          path: acceptance_output.txt
          retention-days: 7
