name: go | iTunes | Acceptance Tests

on:
  workflow_dispatch:
  schedule:
    # Run nightly at 02:00 UTC — the iTunes Search API is public and requires
    # no credentials, so scheduled runs are safe without secrets.
    - cron: '0 2 * * *'

permissions:
  contents: read

jobs:
  acceptance-tests:
    name: '🧪 Run iTunes Acceptance Tests'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run iTunes Acceptance Tests
        env:
          ITUNES_VERBOSE: 'true'
          ITUNES_REQUEST_TIMEOUT: '30s'
        run: |
          echo "::group::🧪 iTunes Acceptance Tests Setup"
          echo "========================================================================"
          echo "  Running iTunes Acceptance Tests"
          echo "  No credentials required — iTunes Search API is public"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -timeout 5m ./itunes/acceptance/... 2>&1 | tee itunes_acceptance_output.txt

      - name: Upload Test Output
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: itunes-acceptance-test-output
          path: itunes_acceptance_output.txt
          retention-days: 7
