name: go | iTunes | Unit Tests

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '.github/workflows/itunes-unit-tests.yml'
      - 'itunes/**/*.go'
      - 'go.mod'
      - 'go.sum'

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  unit-tests:
    name: '🧪 Run iTunes Unit Tests'
    runs-on: ubuntu-24.04-arm
    if: github.event.pull_request.draft == false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Check Out
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'
          cache: true

      - name: Download Dependencies
        run: |
          echo "::group::📦 Downloading Go modules"
          go mod download
          go mod verify
          echo "::endgroup::"

      - name: Run iTunes Unit Tests
        run: |
          echo "::group::🧪 iTunes Unit Tests Setup"
          echo "========================================================================"
          echo "  Running iTunes Unit Tests with Coverage"
          echo "========================================================================"
          echo "::endgroup::"
          echo ""

          go test -v -race -coverprofile=coverage.out -covermode=atomic $(go list ./itunes/... | grep -v '/acceptance') 2>&1 | tee test_output.txt

          echo ""
          echo "::group::📊 Coverage Summary"
          go tool cover -func=coverage.out | tail -1
          echo "::endgroup::"

      - name: Generate Test Statistics
        if: always()
        run: |
          echo "::group::📈 Test Statistics"
          echo "========================================================================"
          echo "  iTunes Unit Test Statistics by Package"
          echo "========================================================================"
          echo ""

          grep "^--- " test_output.txt | awk '
          {
            total_tests++
          }
          END {
            printf "TOTAL_TESTS:%d\n", total_tests > "/dev/stderr"
          }
          ' 2> test_stats_totals.txt

          grep "^ok\|^FAIL" test_output.txt | awk '
          {
            status = $1
            pkg = $2
            sub(/.*\/itunes\//, "itunes/", pkg)
            printf "%-60s %s\n", pkg, status
          }
          ' | sort

          echo ""
          printf "%-60s %s\n" "========================================" "====="
          grep "TOTAL_TESTS:" test_stats_totals.txt | awk -F: '{printf "%-60s %5d\n", "Total iTunes Unit Tests:", $2}'
          printf "%-60s %s\n" "========================================" "====="

          rm -f test_output.txt test_stats_totals.txt

          echo ""
          echo "::endgroup::"

      - name: Generate Coverage Report
        if: always()
        run: |
          echo "::group::📈 Detailed Coverage Report"
          go tool cover -func=coverage.out
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN || '' }}
          slug: deploymenttheory/go-sdk-appleservices
          files: ./coverage.out
          flags: itunes-unittests
          name: codecov-itunes
          fail_ci_if_error: false
          verbose: true

      - name: Upload Coverage Artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: itunes-coverage-report
          path: coverage.out
          retention-days: 30

      - name: Save artifacts
        if: failure()
        run: |
          mkdir -p wr_actions
          echo ${{ github.repository_owner }} > wr_actions/ghowner.txt
          echo ${{ github.event.repository.name }} > wr_actions/ghrepo.txt
          echo ${{ github.event.pull_request.number }} > wr_actions/prnumber.txt

      - name: Upload artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: itunes-artifact
          path: wr_actions

      - name: Get run url
        if: failure()
        run: |
          echo "gha_url=https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}" >> $GITHUB_ENV

      - name: Send build failure comment
        if: failure() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GHA_URL: ${{ env.gha_url }}
        with:
          result-encoding: string
          script: |
            const runUrl = process.env.GHA_URL;
            github.rest.issues.createComment({
              issue_number: ${{ github.event.pull_request.number }},
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `<b>🧪 iTunes Unit Test Failure</b> \n\n This pull request contains failing iTunes unit tests which need to be addressed [here](${runUrl}) .`
            })
